# Compose destinado a Coolify (buildpack: Docker Compose).
# Coolify inyecta automáticamente las labels de Traefik y el certificado Let's Encrypt
# a partir del dominio que configuremos en la UI (paleo.sergiocubelli.space).
# El magic env SERVICE_FQDN_PALEO permite que Coolify resuelva el dominio del servicio.

services:
  paleo:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        QUARTZ_REF: v4
    restart: unless-stopped
    environment:
      - SERVICE_FQDN_PALEO=/
    expose:
      - "80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ > /dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
